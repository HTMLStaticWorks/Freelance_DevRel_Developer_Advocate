<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register — DevOrbit</title>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link rel="stylesheet" href="assets/css/style.css">
    <style>
        body {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            background-image: radial-gradient(var(--border) 1px, transparent 1px);
            background-size: 32px 32px;
        }

        .auth-card {
            width: 100%;
            max-width: 450px;
            background: var(--bg);
            border: 1px solid var(--border);
            padding: 40px;
            border-radius: var(--radius);
            text-align: center;
            box-shadow: 0 10px 40px rgba(0,0,0,0.05);
        }

        .auth-logo { margin-bottom: 32px; }
        .auth-form { text-align: left; }
        .auth-title { font-size: 2rem; margin-bottom: 8px; }
        .auth-subtitle { color: var(--text-muted); font-size: 0.9rem; margin-bottom: 32px; display: block; }
        .social-auth { display: flex; flex-direction: column; gap: 12px; margin-top: 24px; }
        .btn-google { background: #FFFFFF; border: 1px solid #DADCE0; color: #3C4043; text-transform: none; }
        .btn-email-neutral { background: var(--bg-surface); border: 1px solid var(--border); color: var(--text); text-transform: none; }
        .auth-footer { margin-top: 24px; font-size: 0.85rem; color: var(--text-muted); text-align: center; }
        .auth-footer a { color: var(--color-accent); font-weight: 700; }
        .divider { display: flex; align-items: center; gap: 12px; margin: 24px 0; color: var(--text-muted); font-size: 0.75rem; font-family: var(--font-mono); text-transform: uppercase; }
        .divider::before, .divider::after { content: ''; flex-grow: 1; height: 1px; background: var(--border); }
        
        .checkbox-group {
            display: flex;
            gap: 10px;
            align-items: flex-start;
            margin-bottom: 24px;
        }

        .checkbox-group input {
            margin-top: 4px;
        }

        .checkbox-label {
            font-size: 0.85rem;
            color: var(--text-muted);
        }
    </style>
</head>
<body>
    <div class="auth-card">
        <div class="auth-logo">
            <a href="index.html" class="logo">DevOrbit<span>◉</span></a>
        </div>
        
        <div class="auth-form">
            <h2 class="auth-title">Create Account</h2>
            <span class="auth-subtitle">Join the DevOrbit developer community</span>

            <form data-validate id="register-form">
                <div class="form-group" style="margin-bottom: 20px;">
                    <label class="form-label">Full Name</label>
                    <input type="text" class="form-control" placeholder="John Doe" required>
                    <div class="error-msg"></div>
                </div>

                <div class="form-group" style="margin-bottom: 20px;">
                    <label class="form-label">Email Address</label>
                    <input type="email" class="form-control" placeholder="name@company.com" required>
                    <div class="error-msg"></div>
                </div>

                <div class="form-group" style="margin-bottom: 20px;">
                    <label class="form-label">Password</label>
                    <input type="password" class="form-control" placeholder="Min 8 characters" required minlength="8">
                    <div class="error-msg"></div>
                </div>

                <div class="checkbox-group">
                    <input type="checkbox" id="terms" required>
                    <label for="terms" class="checkbox-label">I accept the <a href="#" style="color: var(--color-accent);">Terms & Conditions</a> and Privacy Policy</label>
                </div>

                <button type="submit" class="btn btn-primary" id="register-btn" style="width: 100%;">Register</button>
            </form>

            <div class="divider">Or continue with</div>

            <div class="social-auth">
                <button class="btn btn-google">
                    <svg width="18" height="18" viewBox="0 0 18 18"><path d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.874 2.684-6.615z" fill="#4285f4"/><path d="M9 18c2.43 0 4.467-.806 5.956-2.184l-2.908-2.258c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 0 0 9 18z" fill="#34a853"/><path d="M3.964 10.712c-.18-.54-.282-1.117-.282-1.712s.102-1.173.282-1.712V4.956H.957a8.991 8.991 0 0 0 0 8.088l3.007-2.332z" fill="#fbbc05"/><path d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 0 0 .957 4.956L3.964 7.29C4.672 5.163 6.656 3.58 9 3.58z" fill="#ea4335"/></svg>
                    Continue with Google
                </button>
                <button class="btn btn-email-neutral">
                    <i class="ph ph-envelope-simple"></i>
                    Continue with Email
                </button>
            </div>

            <div class="auth-footer">
                Already have an account? <a href="login.html">Login</a>
            </div>
        </div>
    </div>

    <script src="assets/js/main.js"></script>
    <script>
        const termsCheckbox = document.getElementById('terms');
        const registerBtn = document.getElementById('register-btn');
        
        // Initial state
        registerBtn.disabled = !termsCheckbox.checked;
        registerBtn.style.opacity = termsCheckbox.checked ? '1' : '0.5';

        termsCheckbox.addEventListener('change', () => {
            registerBtn.disabled = !termsCheckbox.checked;
            registerBtn.style.opacity = termsCheckbox.checked ? '1' : '0.5';
        });
    </script>
</body>
</html>
