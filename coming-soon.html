<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coming Soon — DevOrbit</title>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link rel="stylesheet" href="assets/css/style.css">
    <style>
        body {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            background-image: radial-gradient(var(--border) 1px, transparent 1px);
            background-size: 32px 32px;
            text-align: center;
        }

        .countdown {
            display: flex;
            gap: 40px;
            justify-content: center;
            margin: 60px 0;
        }

        .countdown-item {
            display: flex;
            flex-direction: column;
        }

        .countdown-num {
            font-family: var(--font-display);
            font-size: 4rem;
            color: var(--color-accent);
            line-height: 1;
        }

        .countdown-label {
            font-family: var(--font-mono);
            font-size: 0.8rem;
            text-transform: uppercase;
            color: var(--text-muted);
        }

        .coming-soon-content {
            max-width: 600px;
        }

        .social-row {
            display: flex;
            justify-content: center;
            gap: 24px;
            margin-top: 40px;
        }
    </style>
</head>
<body>
    <div class="coming-soon-content">
        <a href="index.html" class="logo" style="margin-bottom: 40px;">DevOrbit<span>◉</span></a>
        <h1 class="hero-title" style="font-size: 3.5rem;">Something's <br> Launching Soon</h1>
        <p class="section-subtitle">DevOrbit v2 is in the build pipeline</p>

        <div class="countdown" id="countdown">
            <div class="countdown-item">
                <span class="countdown-num" id="days">00</span>
                <span class="countdown-label">Days</span>
            </div>
            <div class="countdown-item">
                <span class="countdown-num" id="hours">00</span>
                <span class="countdown-label">Hours</span>
            </div>
            <div class="countdown-item">
                <span class="countdown-num" id="minutes">00</span>
                <span class="countdown-label">Minutes</span>
            </div>
            <div class="countdown-item">
                <span class="countdown-num" id="seconds">00</span>
                <span class="countdown-label">Seconds</span>
            </div>
        </div>

        <form data-validate style="display: flex; gap: 12px; max-width: 500px; margin: 0 auto;">
            <input type="email" required placeholder="Enter your email" class="form-control">
            <button type="submit" class="btn btn-primary" style="white-space: nowrap;">Notify Me</button>
            <p class="success-msg" style="display: none; color: var(--color-accent); margin-top: 12px; width: 100%;">We'll let you know when we launch!</p>
        </form>

        <div class="social-row">
            <a href="#" class="social-link"><i class="ph ph-github-logo"></i></a>
            <a href="#" class="social-link"><i class="ph ph-twitter-logo"></i></a>
            <a href="#" class="social-link"><i class="ph ph-linkedin-logo"></i></a>
        </div>
    </div>

    <div style="position: absolute; bottom: 40px; width: 100%;">
        <p class="copyright">© 2025 DevOrbit. Built for developers.</p>
    </div>

    <script src="assets/js/main.js"></script>
    <script>
        // Set launch date 30 days from now
        const launchDate = new Date();
        launchDate.setDate(launchDate.getDate() + 30);

        const updateCountdown = () => {
            const now = new Date().getTime();
            const distance = launchDate - now;

            const days = Math.floor(distance / (1000 * 60 * 60 * 24));
            const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((distance % (1000 * 60)) / 1000);

            document.getElementById('days').textContent = days.toString().padStart(2, '0');
            document.getElementById('hours').textContent = hours.toString().padStart(2, '0');
            document.getElementById('minutes').textContent = minutes.toString().padStart(2, '0');
            document.getElementById('seconds').textContent = seconds.toString().padStart(2, '0');

            if (distance < 0) {
                clearInterval(interval);
                document.getElementById('countdown').innerHTML = "LAUNCHED";
            }
        };

        const interval = setInterval(updateCountdown, 1000);
        updateCountdown();
    </script>
</body>
</html>
