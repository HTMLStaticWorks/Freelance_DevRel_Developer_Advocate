<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Dark background -->
  <rect width="32" height="32" rx="6" fill="#0A0A0A"/>

  <!-- Tilted orbit ellipse -->
  <ellipse cx="16" cy="16" rx="13" ry="5"
    fill="none" stroke="#00FF94" stroke-width="1.5"
    transform="rotate(-25 16 16)"/>

  <!-- Core planet circle -->
  <circle cx="16" cy="16" r="4.5" fill="#00FF94"/>

  <!-- Bullseye inner ring -->
  <circle cx="16" cy="16" r="1.8" fill="#0A0A0A"/>

  <!-- Orbiting satellite dot (top of orbit path) -->
  <circle cx="8" cy="9" r="2.2" fill="#00FF94"/>
</svg>
